services:
  core:
    build:
      context: ./core
      dockerfile: Dockerfile.dev
    container_name: vessel_core
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./core:/app
      - ./core/storage:/app/storage
    command: php artisan serve --host=0.0.0.0 --port=8000
    restart: unless-stopped
